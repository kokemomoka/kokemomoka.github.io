<script>
document.addEventListener("DOMContentLoaded", function () {
  const modal = document.getElementById("imageModal");
  const closeBtn = document.querySelector(".close");
  const swiperWrapper = document.getElementById("modal-swiper-wrapper");

  // lightbox-trigger をすべて探してイベントをつける
  document.querySelectorAll('.lightbox-trigger').forEach(img => {
    img.addEventListener('click', () => {
      const figure = img.closest('figure');
      const images = JSON.parse(figure.dataset.images || '["' + img.src + '"]');

      swiperWrapper.innerHTML = ''; // 中身をリセット

      images.forEach(src => {
        const slide = document.createElement('div');
        slide.className = 'swiper-slide';
        slide.innerHTML = `<img src="${src}" alt="">`;
        swiperWrapper.appendChild(slide);
      });

      modal.style.display = 'block';

      new Swiper('.swiper', {
        navigation: {
          nextEl: '.swiper-button-next',
          prevEl: '.swiper-button-prev',
        },
        loop: true
      });
    });
  });

  // ✖ボタンで閉じる
  closeBtn.addEventListener('click', () => {
    modal.style.display = 'none';
    swiperWrapper.innerHTML = '';
  });

  // 背景をクリックしたら閉じる（モーダルの外側）
  modal.addEventListener('click', (e) => {
    if (e.target === modal) {
      modal.style.display = 'none';
      swiperWrapper.innerHTML = '';
    }
  });
});
</script>

<script>
document.addEventListener("DOMContentLoaded", function () {
  // フィルターボタンの処理
  const filterButtons = document.querySelectorAll('.gallery-filter button');
  const galleryItems = document.querySelectorAll('.gallery-item');

  filterButtons.forEach(button => {
    button.addEventListener('click', () => {
      const filter = button.getAttribute('data-filter');

      galleryItems.forEach(item => {
        if (filter === 'all' || item.classList.contains(filter)) {
          item.style.display = 'block';
        } else {
          item.style.display = 'none';
        }
      });
    });
  });
});
</script>

<script>
  document.addEventListener("DOMContentLoaded", function () {
    const filters = document.querySelectorAll('.filter');
    const items = document.querySelectorAll('.gallery-item');

    filters.forEach(filter => {
      filter.addEventListener('click', () => {
        // Active クラスの切り替え
        document.querySelector('.filter.active')?.classList.remove('active');
        filter.classList.add('active');

        const filterValue = filter.getAttribute('data-filter');

        items.forEach(item => {
          if (filterValue === 'all' || item.classList.contains(filterValue)) {
            item.style.display = 'block';
          } else {
            item.style.display = 'none';
          }
        });
      });
    });
  });
</script>
